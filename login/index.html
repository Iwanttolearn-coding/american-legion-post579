<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | American Legion Post 579</title>
  <link rel="stylesheet" href="../assets/css/style.css"/>
  <link rel="stylesheet" href="../assets/css/portal.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="al-mark">American Legion</div>
      <div class="al-sub">Post 579 — Bicentennial</div>
    </div>
    <div class="auth-title">Member Login</div>
    <div class="auth-desc">Sign in to access your member dashboard, events, and documents.</div>
    <div class="auth-error" id="loginError">Invalid email or password. Please try again.</div>
    <form id="loginForm">
      <div class="auth-field"><label>Email Address *</label><input type="email" id="loginEmail" placeholder="your@email.com" required/></div>
      <div class="auth-field"><label>Password *</label><input type="password" id="loginPass" placeholder="Your password" required/></div>
      <div style="display:flex;justify-content:flex-end;margin-bottom:16px;"><a href="../register/" style="font-size:0.78rem;color:#B22234;">Forgot password?</a></div>
      <button type="submit" class="auth-btn">Sign In</button>
    </form>
    <div class="auth-divider">— or —</div>
    <div class="auth-link">Don't have an account? <a href="../register/">Create Account</a></div>
    <div class="auth-link" style="margin-top:10px;"><a href="../index.html" style="color:#999;">← Back to Post 579 Home</a></div>

    <!-- ADMIN QUICK ACCESS -->
    <div style="margin-top:24px;background:#f5f5f0;border-radius:8px;padding:16px;text-align:center;border:1px solid #e0e0e0;">
      <div style="font-size:0.72rem;color:#999;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Post Officers</div>
      <a href="../admin/" style="display:inline-block;background:#1B2A4A;color:#C8A84B;padding:10px 24px;border-radius:4px;font-size:0.78rem;font-weight:bold;text-transform:uppercase;letter-spacing:1px;">Admin Dashboard →</a>
    </div>
  </div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', function(e){
  e.preventDefault();
  const email = document.getElementById('loginEmail').value;
  const pass = document.getElementById('loginPass').value;
  // Admin shortcut
  if(email === 'commander@post579.org' && pass === 'Post579!') {
    window.location.href = '../admin/';
  } else if(email && pass) {
    window.location.href = '../member-dashboard/';
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
});
</script>
</body>
</html>
