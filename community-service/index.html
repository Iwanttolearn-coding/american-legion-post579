<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Community Service | American Legion Post 579</title>
  <link rel="stylesheet" href="../assets/css/style.css"/>
</head>
<body>
<div style="background:#1B2A4A;padding:12px 0;text-align:center;"><a href="../index.html" style="color:rgba(255,255,255,0.6);font-size:0.78rem;text-transform:uppercase;letter-spacing:1px;">← Post 579 Home</a></div>
<div style="background:linear-gradient(135deg,#0D1B33,#1B2A4A);padding:48px 0;text-align:center;border-bottom:4px solid #C8A84B;">
  <h1 style="font-size:2rem;color:#fff;font-weight:900;text-transform:uppercase;letter-spacing:2px;">Community Service</h1>
  <p style="color:rgba(255,255,255,0.7);margin-top:8px;">Serving San Antonio — Post 579</p>
</div>
<div style="max-width:820px;margin:0 auto;padding:60px 20px;">
  <div style="background:#fff;border-radius:12px;padding:40px;box-shadow:0 4px 20px rgba(0,0,0,0.1);border-top:4px solid #B22234;">
    <h2 style="font-size:1.1rem;color:#1B2A4A;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;">Community Service Registration</h2>
    <p style="color:#999;font-size:0.85rem;margin-bottom:28px;">Register to participate in Post 579 community service events.</p>
    <form id="csForm" data-form-type="community_service">
      <input type="text" name="website" style="display:none;" tabindex="-1" autocomplete="off"/>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;">
        <div><label style="font-size:0.72rem;color:#1B2A4A;text-transform:uppercase;letter-spacing:1px;font-weight:bold;display:block;margin-bottom:5px;">Full Name *</label><input type="text" name="full_name" required placeholder="Your name" style="width:100%;padding:11px 14px;border:1.5px solid #e0e0e0;border-radius:5px;font-size:0.9rem;"/></div>
        <div><label style="font-size:0.72rem;color:#1B2A4A;text-transform:uppercase;letter-spacing:1px;font-weight:bold;display:block;margin-bottom:5px;">Phone *</label><input type="tel" name="phone_number" required placeholder="(210) 674-8069" style="width:100%;padding:11px 14px;border:1.5px solid #e0e0e0;border-radius:5px;font-size:0.9rem;"/></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;">
        <div><label style="font-size:0.72rem;color:#1B2A4A;text-transform:uppercase;letter-spacing:1px;font-weight:bold;display:block;margin-bottom:5px;">Email *</label><input type="email" name="email" required placeholder="your@email.com" style="width:100%;padding:11px 14px;border:1.5px solid #e0e0e0;border-radius:5px;font-size:0.9rem;"/></div>
        <div><label style="font-size:0.72rem;color:#1B2A4A;text-transform:uppercase;letter-spacing:1px;font-weight:bold;display:block;margin-bottom:5px;">Service Event *</label><select name="event" required style="width:100%;padding:11px 14px;border:1.5px solid #e0e0e0;border-radius:5px;font-size:0.9rem;"><option value="">-- Select Event --</option><option>Community Cleanup</option><option>Veterans Food Drive</option><option>Buddy Poppy Campaign</option><option>Honor Guard</option><option>Veterans Day Ceremony</option><option>Memorial Day Ceremony</option><option>Other Post 579 Event</option></select></div>
      </div>
      <div style="margin-bottom:20px;"><label style="font-size:0.72rem;color:#1B2A4A;text-transform:uppercase;letter-spacing:1px;font-weight:bold;display:block;margin-bottom:5px;">Notes or Questions</label><textarea name="message" placeholder="Anything you'd like to share..." style="width:100%;padding:11px 14px;border:1.5px solid #e0e0e0;border-radius:5px;font-size:0.9rem;min-height:90px;resize:vertical;font-family:Georgia,serif;"></textarea></div>
      <button type="submit" style="width:100%;padding:14px;background:#B22234;color:#fff;border:none;border-radius:5px;font-size:0.9rem;font-weight:bold;text-transform:uppercase;letter-spacing:2px;cursor:pointer;font-family:Georgia,serif;">Register for Service Event</button>
    </form>
    <div id="csSuccess" style="display:none;background:#f0fff4;border:2px solid #2ecc71;border-radius:8px;padding:20px;text-align:center;margin-top:16px;"><strong style="color:#155724;">✅ Registered!</strong><br/><span style="font-size:0.85rem;color:#155724;">Thank you for volunteering. Post 579 will be in touch with event details.</span></div>
  </div>
</div>
<footer style="background:#1B2A4A;padding:20px;text-align:center;border-top:3px solid #C8A84B;"><p style="color:rgba(255,255,255,0.5);font-size:0.78rem;">&copy; 2026 American Legion Post 579 | <a href="../index.html" style="color:#C8A84B;">Home</a></p></footer>
<script>document.getElementById('csForm').addEventListener('submit',function(e){e.preventDefault();this.style.display='none';document.getElementById('csSuccess').style.display='block';});</script>
</body>
</html>
